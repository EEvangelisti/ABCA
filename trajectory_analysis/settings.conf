# Input and output paths.
# Relative paths are interpreted relative to this configuration file.
XML_SOURCE="tracks"
OUTPUT_ROOT="trajectory_analysis"

# Actions.
EXTRACT_METRICS=1
MAKE_METRICS_PLOTS=1
TRAJECTORY_OVERVIEW=1
EXTRACT_ABCA_PARAMETERS=0
RUN_HMM=0

# General trajectory parameters.
FRAME_INTERVAL_S=0.07
COORD_SCALE=1
SPATIAL_UNIT=micron
MIN_SPOTS=10
DIRECTION_THRESHOLD_DEG=30
MAX_LAG=25
DPI=300

# Trajectory overview.
ANGULAR_BINS=36
MAX_TRACKS_PER_DECILE=0

# HMM analysis.
HMM_MIN_STATES=2
HMM_MAX_STATES=7
HMM_INITIALIZATIONS=10
HMM_COVARIANCE_TYPE=diag
HMM_MIN_TRACK_OBSERVATIONS=10
HMM_TRANSITION_GRAPH_THRESHOLD=0.02
HMM_MAX_TRACKS_PLOT=200

# Set to 1 to reduce terminal output.
QUIET=0
